<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Channel Landing</title>
<style>
body{margin:0;background:#17212b;font-family:Arial,sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{width:380px;background:#242f3d;border-radius:18px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.4)}
.top{background:#2b5278;padding:16px;font-weight:bold}
.banner{height:110px;background:linear-gradient(135deg,#2AABEE,#4f7cff)}
.avatar{width:110px;height:110px;border-radius:50%;display:block;margin:-55px auto 0;border:4px solid #242f3d;object-fit:cover}
.c{padding:20px;text-align:center}
h1{margin:12px 0 4px}
.sub{color:#aeb8c3}
.btn{display:block;margin:22px 0;padding:14px;background:#2AABEE;color:#fff;text-decoration:none;border-radius:10px;font-weight:bold}
.desc{color:#d5dbe1;line-height:1.5}
</style></head><body>
<div class="card">
<div class="top">Telegram‑style Channel</div>
<div class="banner"></div>
<img id="img" class="avatar">
<div class="c">
<h1 id="title"></h1>
<div id="subs" class="sub"></div>
<p id="desc" class="desc"></p>
<a id="join" class="btn">JOIN CHANNEL</a>
</div></div>
<script>
const CONFIG={
image:"https://placehold.co/220x220/png",
title:"Xenora News",
subscribers:"12,345 subscribers",
description:"Latest technology, AI, gadgets and news.",
join:"https://t.me/yourchannel"
};
img.src=CONFIG.image;
title.textContent=CONFIG.title;
subs.textContent=CONFIG.subscribers;
desc.textContent=CONFIG.description;
join.href=CONFIG.join;
</script></body></html>
