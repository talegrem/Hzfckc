body::before {

    inset: 0;
    background: rgba(0,0,0,0.55);

  .topbar {
    display: flex;
    align-items: center;

    border-bottom: 1px solid #2a2a2a;
  }
  .topbar .logo {

    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 18px;
  }
  .tg-icon {
    width: 32px;
    height: 32px;
    background: #229ED9;
    border-radius: 50%;
    display: grid;
    place-items: center;
  }
  .tg-icon svg { width: 20px; fill: #fff; }
  .download-btn {

    cursor: pointer;
  }
  .card {
    max-width: 380px;
    margin: 60px auto;
    background: #1c1c1c;
    border-radius: 16px;
    padding: 24px 20px 32px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin: 0 auto 16px;
    background: #333 url('https://via.placeholder.com/120') center/cover no-repeat;
    border: 3px solid #2a2a2a;
  }
  .channel-name {
    font-size: 22px;
    font-weight: 700;
    font-style: italic;
    margin-bottom: 6px;
  }
  .subs {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 20px;
  }
  .join-btn {
    width: 100%;
    background: #229ED9;
    border: none;
    color: #fff;
    padding: 12px;
    border-radius: 24px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .invite-text {
    color: #aaa;
    font-size: 14px;
    margin-top: 18px;
    line-height: 1.5;
  }
