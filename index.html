<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Channel Invite</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0e0e0e;
    color: #fff;
    background-image: radial-gradient(#1f1f1f 1px, transparent 1px);
    background-size: 24px 24px;
  }
  .topbar {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    background: #1c1c1c;
    border-bottom: 1px solid #2a2a2a;
  }
  .topbar .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 18px;
  }
  .tg-icon {
    width: 32px;
    height: 32px;
    background: #229ED9;
    border-radius: 50%;
    display: grid;
    place-items: center;
  }
  .tg-icon svg { width: 20px; fill: #fff; }
  .download-btn {
    margin-left: auto;
    background: #229ED9;
    border: none;
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-weight: 600;
    cursor: pointer;
  }
  .card {
    max-width: 380px;
    margin: 60px auto;
    background: #1c1c1c;
    border-radius: 16px;
    padding: 24px 20px 32px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin: 0 auto 16px;
    background: #333 url('https://via.placeholder.com/120') center/cover no-repeat;
    border: 3px solid #2a2a2a;
  }
  .channel-name {
    font-size: 22px;
    font-weight: 700;
    font-style: italic;
    margin-bottom: 6px;
  }
  .subs {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 20px;
  }
  .join-btn {
    width: 100%;
    background: #229ED9;
    border: none;
    color: #fff;
    padding: 12px;
    border-radius: 24px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .invite-text {
    color: #aaa;
    font-size: 14px;
    margin-top: 18px;
    line-height: 1.5;
  }
</style>
</head>
<body>
